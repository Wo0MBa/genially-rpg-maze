<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Генератор Лабиринта Genially</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #0c1427; color: #e0e0e0; padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; background: rgba(0, 0, 0, 0.8); padding: 20px; border-radius: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    h1 { color: #00bfff; text-align: center; }
    input, button, textarea { width: 100%; margin-bottom: 15px; padding: 10px; border-radius: 8px; border: 1px solid #00bfff; background: rgba(0,0,0,0.3); color: white; }
    button { background: #00bfff; cursor: pointer; font-weight: bold; border: none; transition: 0.3s; }
    button:hover { background: #008cba; }
    #preview-area { position: relative; display: inline-block; width: 100%; border: 2px dashed #555; margin-bottom: 20px; cursor: crosshair; }
    #bg-preview { width: 100%; display: block; border-radius: 8px; }
    .star-marker { position: absolute; width: 20px; height: 20px; background: gold; border-radius: 50%; transform: translate(-50%, -50%); border: 2px solid white; }
    .start-marker { background: #00ff00; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Создание Лабиринта</h1>
    
    <h3>1. Настройки графики</h3>
    <input type="url" id="bg-url" placeholder="URL фона (лабиринта)">
    <input type="url" id="char1-url" placeholder="URL персонажа 1">
    <input type="url" id="char2-url" placeholder="URL персонажа 2">
    <input type="url" id="char3-url" placeholder="URL персонажа 3">
    <button id="load-bg">Загрузить фон</button>

    <h3>2. Расстановка точек</h3>
    <p style="font-size: 0.9em; color: #aaa;">Первый клик задает <b>СТАРТ</b> (зеленый). Последующие клики создают <b>ЗВЕЗДЫ</b> (желтые).</p>
    <div id="preview-area" style="display: none;">
      <img id="bg-preview" src="" alt="Фон">
    </div>

    <h3>3. Генерация кода</h3>
    <button id="generate-btn">Создать iframe для Genially</button>
    <textarea id="iframe-code" rows="5" readonly></textarea>
  </div>

  <script>
    let gameData = {
      bg: '', chars: [], startPos: null, tasks: []
    };

    const bgPreview = document.getElementById('bg-preview');
    const previewArea = document.getElementById('preview-area');

    document.getElementById('load-bg').addEventListener('click', () => {
      const url = document.getElementById('bg-url').value;
      if(url) {
        bgPreview.src = url;
        gameData.bg = url;
        previewArea.style.display = 'inline-block';
      }
    });

    previewArea.addEventListener('click', (e) => {
      // Вычисляем проценты, чтобы координаты были адаптивными
      const rect = bgPreview.getBoundingClientRect();
      const xPercent = ((e.clientX - rect.left) / rect.width) * 100;
      const yPercent = ((e.clientY - rect.top) / rect.height) * 100;

      if (!gameData.startPos) {
        // Устанавливаем точку старта
        gameData.startPos = { x: xPercent, y: yPercent };
        addMarker(xPercent, yPercent, 'start-marker');
      } else {
        // Добавляем задание
        const question = prompt("Введите текст вопроса:");
        if (!question) return;
        const options = prompt("Введите варианты ответа через запятую (например: Да,Нет,Не знаю):").split(',');
        const correct = prompt(`Введите ПРАВИЛЬНЫЙ вариант из перечисленных: \n(${options.join(', ')})`);
        
        gameData.tasks.push({ x: xPercent, y: yPercent, question, options, correct });
        addMarker(xPercent, yPercent, 'star-marker');
      }
    });

    function addMarker(x, y, className) {
      const marker = document.createElement('div');
      marker.className = `star-marker ${className}`;
      marker.style.left = `${x}%`;
      marker.style.top = `${y}%`;
      previewArea.appendChild(marker);
    }

    document.getElementById('generate-btn').addEventListener('click', () => {
      gameData.chars = [
        document.getElementById('char1-url').value,
        document.getElementById('char2-url').value,
        document.getElementById('char3-url').value
      ].filter(Boolean);

      if (!gameData.bg || !gameData.startPos) {
        return alert('Загрузите фон и укажите хотя бы точку старта!');
      }

      // Кодируем данные в Base64 с поддержкой кириллицы
      const encodedData = btoa(encodeURIComponent(JSON.stringify(gameData)));
      
      const currentUrl = window.location.href.replace(/\/[^\/]*$/, '/');
      const widgetUrl = `${currentUrl}maze-widget.html?data=${encodedData}`;
      
      const iframeStr = `<iframe src="${widgetUrl}" width="100%" height="600" frameborder="0" allowfullscreen></iframe>`;
      const textarea = document.getElementById('iframe-code');
      textarea.value = iframeStr;
      
      navigator.clipboard.writeText(iframeStr);
      alert('Код скопирован!');
    });
  </script>
</body>
</html>
