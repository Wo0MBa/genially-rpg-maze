<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Генератор Лабиринта Genially</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #0c1427; color: #e0e0e0; padding: 20px; }
    .container { max-width: 900px; margin: 0 auto; background: rgba(0, 0, 0, 0.8); padding: 20px; border-radius: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    h1 { color: #00bfff; text-align: center; }
    
    .section-header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid #333; padding-bottom: 10px; margin-top: 30px; margin-bottom: 15px; }
    .section-header h3 { margin: 0; border: none; padding: 0; }
    
    input[type="url"], input[type="text"], textarea { width: 100%; margin-bottom: 10px; padding: 12px; border-radius: 8px; border: 1px solid #00bfff; background: rgba(0,0,0,0.3); color: white; box-sizing: border-box; }
    button { background: #00bfff; color: white; padding: 12px; cursor: pointer; font-weight: bold; border: none; border-radius: 8px; transition: 0.3s; width: 100%; }
    button:hover { background: #008cba; }
    
    #preview-area { position: relative; display: inline-block; width: 100%; border: 2px dashed #555; margin-bottom: 20px; cursor: crosshair; }
    #bg-preview { width: 100%; display: block; border-radius: 8px; }
    
    .marker { position: absolute; transform: translate(-50%, -50%); display: flex; justify-content: center; align-items: center; font-weight: bold; color: black; border-radius: 50%; border: 2px solid white; pointer-events: none; }
    .start-marker { width: 30px; height: 30px; background: #00ff00; z-index: 10;}
    .star-marker { width: 25px; height: 25px; background: gold; z-index: 10;}

    #tasks-panel { display: flex; flex-direction: column; gap: 15px; }
    .task-card { background: rgba(0, 191, 255, 0.1); border: 1px solid #00bfff; padding: 15px; border-radius: 8px; position: relative; padding-top: 35px; }
    .task-badge { position: absolute; top: -10px; left: -10px; background: gold; color: black; width: 30px; height: 30px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; z-index: 5;}
    
    .delete-task-btn { position: absolute; top: 10px; right: 10px; width: 35px; height: 35px; padding: 0; background: #dc3545; color: white; border-radius: 5px; font-size: 16px; cursor: pointer; border: none; transition: 0.2s; }
    .delete-task-btn:hover { background: #c82333; transform: scale(1.1); }

    .opt-wrapper { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
    .opt-wrapper input { flex: 1; margin-bottom: 0 !important; }

    .delete-opt-btn { width: 44px; height: 44px; background: #dc3545; color: white; border-radius: 8px; font-size: 16px; cursor: pointer; border: none; transition: 0.2s; display: flex; justify-content: center; align-items: center; flex-shrink: 0; }
    .delete-opt-btn:hover { background: #c82333; transform: scale(1.1); }

    .opts-container { display: flex; flex-direction: column; }
    .add-opt-btn { background: transparent; border: 1px dashed #00bfff; color: #00bfff; padding: 8px; margin-bottom: 15px; }
    .add-opt-btn:hover { background: rgba(0, 191, 255, 0.1); }
  </style>
</head>
<body>
  <div class="container">
    <h1>Генератор Игры-Лабиринта</h1>
    
    <div class="section-header">
      <h3>1. Настройки графики</h3>
    </div>
    <input type="url" id="bg-url" placeholder="URL фона (лабиринта)">
    <input type="url" id="char1-url" placeholder="URL персонажа 1">
    <input type="url" id="char2-url" placeholder="URL персонажа 2">
    <input type="url" id="char3-url" placeholder="URL персонажа 3">
    <button id="load-bg">Загрузить фон</button>

    <div class="section-header">
      <h3>2. Расстановка точек</h3>
      <button id="reset-start-btn" style="width: auto; padding: 6px 15px; background: #dc3545; display: none; margin: 0; font-size: 14px;">Сбросить СТАРТ</button>
    </div>
    <p style="color: #aaa; margin-top: 0;">Первый клик: <b>СТАРТ</b> (зеленый). Следующие: <b>ЗВЕЗДЫ</b> (желтые).</p>
    
    <div id="preview-area" style="display: none;">
      <img id="bg-preview" src="" alt="Фон">
    </div>

    <div class="section-header">
      <h3>3. Задания</h3>
      <button id="clear-all-tasks-btn" style="width: auto; padding: 6px 15px; background: #ffaa00; color: #000; display: none; margin: 0; font-size: 14px;">🗑 Очистить всё</button>
    </div>
    
    <div id="tasks-panel">
      <p id="no-tasks-msg" style="color: #666; font-style: italic;">Кликните по фону, чтобы добавить звезду с заданием...</p>
    </div>

    <div class="section-header">
      <h3>4. Финал</h3>
    </div>
    <button id="generate-btn" style="background: #00cc66;">Сгенерировать код для Genially</button>
    <textarea id="iframe-code" rows="6" readonly style="margin-top: 15px;"></textarea>
  </div>

  <script>
    let gameData = { bg: '', chars: [], startPos: null, tasks: [] };
    let taskCounter = 0;

    const bgPreview = document.getElementById('bg-preview');
    const previewArea = document.getElementById('preview-area');
    const tasksPanel = document.getElementById('tasks-panel');
    const resetStartBtn = document.getElementById('reset-start-btn');
    const clearAllTasksBtn = document.getElementById('clear-all-tasks-btn');

    document.getElementById('load-bg').addEventListener('click', () => {
      const url = document.getElementById('bg-url').value || 'https://images.unsplash.com/photo-1518709268805-4e9042af9f23?w=1200';
      bgPreview.src = url;
      gameData.bg = url;
      previewArea.style.display = 'inline-block';
    });

    resetStartBtn.addEventListener('click', () => {
      gameData.startPos = null;
      const startMarker = document.querySelector('.start-marker');
      if (startMarker) startMarker.remove();
      resetStartBtn.style.display = 'none';
    });

    clearAllTasksBtn.addEventListener('click', () => {
      if (confirm('Точно удалить все звезды и задания? Фон и точка старта останутся.')) {
        gameData.tasks = [];
        document.querySelectorAll('.task-card').forEach(card => card.remove());
        document.querySelectorAll('.task-marker').forEach(marker => marker.remove());
        document.getElementById('no-tasks-msg').style.display = 'block';
        clearAllTasksBtn.style.display = 'none';
      }
    });

    previewArea.addEventListener('click', (e) => {
      const rect = bgPreview.getBoundingClientRect();
      const xPercent = ((e.clientX - rect.left) / rect.width) * 100;
      const yPercent = ((e.clientY - rect.top) / rect.height) * 100;

      if (!gameData.startPos) {
        gameData.startPos = { x: xPercent, y: yPercent };
        addMarker(xPercent, yPercent, 'start-marker', 'S', 'start');
        resetStartBtn.style.display = 'inline-block';
      } else {
        taskCounter++;
        gameData.tasks.push({ x: xPercent, y: yPercent, id: taskCounter });
        addMarker(xPercent, yPercent, 'star-marker', taskCounter, taskCounter);
        createTaskForm(taskCounter);
        updateNumbers();
        clearAllTasksBtn.style.display = 'inline-block';
      }
    });

    function addMarker(x, y, className, text, id) {
      const marker = document.createElement('div');
      marker.className = `marker ${className}`;
      if (className === 'star-marker') {
        marker.classList.add('task-marker');
        marker.id = `marker-${id}`;
      }
      marker.style.left = `${x}%`;
      marker.style.top = `${y}%`;
      marker.innerText = text;
      previewArea.appendChild(marker);
    }

    function createTaskForm(id) {
      document.getElementById('no-tasks-msg').style.display = 'none';
      
      const card = document.createElement('div');
      card.className = 'task-card';
      card.id = `task-form-${id}`;
      
      card.innerHTML = `
        <div class="task-badge">${id}</div>
        <button type="button" class="delete-task-btn" data-id="${id}" title="Удалить звезду">✖</button>
        <input type="text" class="task-q" placeholder="Вопрос (например: 2 + 2 = ?)">
        <div class="opts-container" id="opts-${id}">
          <div class="opt-wrapper">
            <input type="text" class="task-opt" placeholder="Неправильный вариант 1">
            <button type="button" class="delete-opt-btn" title="Удалить вариант">✖</button>
          </div>
          <div class="opt-wrapper">
            <input type="text" class="task-opt" placeholder="Неправильный вариант 2">
            <button type="button" class="delete-opt-btn" title="Удалить вариант">✖</button>
          </div>
        </div>
        <button type="button" class="add-opt-btn" data-id="${id}">+ Добавить вариант ответа</button>
        <input type="text" class="task-correct" placeholder="ПРАВИЛЬНЫЙ вариант (впишите сюда ответ)" style="border-color: #00ff00; background: rgba(0, 255, 0, 0.1);">
      `;
      tasksPanel.appendChild(card);
    }

    tasksPanel.addEventListener('click', (e) => {
      if (e.target.classList.contains('delete-task-btn')) {
        const id = parseInt(e.target.getAttribute('data-id'));
        const form = document.getElementById(`task-form-${id}`);
        if (form) form.remove();
        const marker = document.getElementById(`marker-${id}`);
        if (marker) marker.remove();
        gameData.tasks = gameData.tasks.filter(t => t.id !== id);
        updateNumbers();
        
        if (gameData.tasks.length === 0) {
          document.getElementById('no-tasks-msg').style.display = 'block';
          clearAllTasksBtn.style.display = 'none';
        }
      }

      if (e.target.classList.contains('delete-opt-btn')) {
        e.target.closest('.opt-wrapper').remove();
      }

      if (e.target.classList.contains('add-opt-btn')) {
        const id = e.target.getAttribute('data-id');
        const container = document.getElementById(`opts-${id}`);
        const newIndex = container.children.length + 1;
        const wrapper = document.createElement('div');
        wrapper.className = 'opt-wrapper';
        wrapper.innerHTML = `
          <input type="text" class="task-opt" placeholder="Еще один вариант">
          <button type="button" class="delete-opt-btn" title="Удалить вариант">✖</button>
        `;
        container.appendChild(wrapper);
      }
    });

    function updateNumbers() {
      const cards = document.querySelectorAll('.task-card');
      const markers = document.querySelectorAll('.task-marker');
      cards.forEach((card, index) => {
        const badge = card.querySelector('.task-badge');
        if (badge) badge.innerText = index + 1;
      });
      markers.forEach((marker, index) => {
        marker.innerText = index + 1;
      });
    }

    document.getElementById('generate-btn').addEventListener('click', () => {
      const defaultChar = 'https://cdn-icons-png.flaticon.com/128/104/104663.png';
      gameData.chars = [
        document.getElementById('char1-url').value || defaultChar,
        document.getElementById('char2-url').value,
        document.getElementById('char3-url').value
      ].filter(Boolean);

      if (!gameData.bg || !gameData.startPos) {
        return alert('Загрузите фон и укажите хотя бы точку старта!');
      }

      if (gameData.tasks.length === 0) {
        return alert('Поставьте хотя бы одну звезду с заданием!');
      }

      let formsValid = true;
      gameData.tasks.forEach((task) => {
        const form = document.getElementById(`task-form-${task.id}`);
        if (!form) return;

        const q = form.querySelector('.task-q').value.trim();
        const correct = form.querySelector('.task-correct').value.trim();
        
        let options = Array.from(form.querySelectorAll('.task-opt'))
                             .map(input => input.value.trim())
                             .filter(Boolean);

        if (correct && !options.includes(correct)) {
          options.push(correct);
        }

        options.sort(() => Math.random() - 0.5);

        if (!q || !correct || options.length < 2) {
          formsValid = false;
        }

        task.question = q;
        task.options = options;
        task.correct = correct;
      });

      if (!formsValid) {
        return alert('Заполните все задания! В каждом вопросе должен быть правильный ответ и минимум один неправильный вариант.');
      }

      const encodedData = btoa(encodeURIComponent(JSON.stringify(gameData)));
      const currentUrl = window.location.href.replace(/\/[^\/]*$/, '/');
      const widgetUrl = `${currentUrl}maze-widget.html`;
      
      // СЕКРЕТНОЕ ОРУЖИЕ ПРОТИВ ЛИМИТОВ GENIALLY
      // Ссылка (src) теперь короткая. Все данные лежат в name и передаются через postMessage.
      const iframeStr = `<div style="width:100%;height:600px;position:relative;">
  <iframe id="maze-widget" src="${widgetUrl}" name="${encodedData}" width="100%" height="100%" frameborder="0" allowfullscreen style="border:none;"></iframe>
  <script>
    window.addEventListener('message', function(e) {
      if (e.data === 'get_maze_data') {
        document.getElementById('maze-widget').contentWindow.postMessage({ type: 'maze_data', payload: '${encodedData}' }, '*');
      }
    });
  </scr` + `ipt>
</div>`;

      const textarea = document.getElementById('iframe-code');
      textarea.value = iframeStr;
      
      navigator.clipboard.writeText(iframeStr);
      const btn = document.getElementById('generate-btn');
      btn.innerText = '✅ Идеальный код для Genially скопирован!';
      setTimeout(() => btn.innerText = 'Сгенерировать код для Genially', 3000);
    });
  </script>
</body>
</html>
