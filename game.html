<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Maze Game Engine</title>
    <style>
        :root {
            --primary: #00bfff;
            --danger: #ff4b2b;
            --success: #2ecc71;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #000;
        }
        #game-container {
            position: relative; width: 100vw; height: 100vh;
            background-size: cover; background-position: center;
        }
        /* Экран выбора персонажа */
        #char-selection {
            position: absolute; inset: 0; background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; z-index: 1000; color: white;
        }
        .char-list { display: flex; gap: 20px; margin-top: 20px; }
        .char-item {
            cursor: pointer; transition: transform 0.3s;
            border: 3px solid transparent; border-radius: 15px; padding: 10px;
        }
        .char-item:hover { transform: scale(1.1); border-color: var(--primary); }
        .char-item img { width: 100px; height: 100px; object-fit: contain; }

        /* Персонаж */
        #hero {
            position: absolute; width: 60px; height: 60px;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 50; pointer-events: none;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
        }

        /* Звезды/Задания */
        .star {
            position: absolute; width: 40px; height: 40px;
            cursor: pointer; transform: translate(-50%, -50%);
            transition: transform 0.3s; z-index: 40;
            filter: drop-shadow(0 0 10px gold);
        }
        .star:hover { transform: translate(-50%, -50%) scale(1.2); }
        .star.completed { opacity: 0.5; filter: grayscale(1); }

        /* Модалка задания */
        #quiz-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            background: white; padding: 25px; border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); z-index: 2000;
            max-width: 90%; width: 400px; transition: transform 0.3s;
        }
        #quiz-modal.active { transform: translate(-50%, -50%) scale(1); }
        .options { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .option-btn {
            padding: 12px; border: 2px solid #eee; border-radius: 10px;
            background: none; cursor: pointer; text-align: left; font-size: 16px;
            transition: all 0.2s;
        }
        .option-btn:hover { background: #f8f9fa; border-color: var(--primary); }
    </style>
</head>
<body>

<div id="game-container">
    <!-- Выбор персонажа -->
    <div id="char-selection">
        <h2>Выбери своего героя</h2>
        <div class="char-list" id="char-list"></div>
    </div>

    <!-- Персонаж -->
    <img id="hero" src="" style="display: none;">

    <!-- Модалка -->
    <div id="quiz-modal">
        <h3 id="question-text">Вопрос?</h3>
        <div class="options" id="options-container"></div>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const data = JSON.parse(decodeURIComponent(urlParams.get('data') || '{}'));

    const state = {
        currentStar: null,
        heroPos: { x: data.startX || 50, y: data.startY || 90 },
        completed: []
    };

    function init() {
        const container = document.getElementById('game-container');
        container.style.backgroundImage = `url('${data.bg}')`;

        // Рендерим выбор героев
        const charList = document.getElementById('char-list');
        data.chars.forEach((url, index) => {
            const div = document.createElement('div');
            div.className = 'char-item';
            div.innerHTML = `<img src="${url}">`;
            div.onclick = () => selectHero(url);
            charList.appendChild(div);
        });

        // Рендерим звезды
        data.stars.forEach((star, index) => {
            const img = document.createElement('img');
            img.src = 'https://cdn-icons-png.flaticon.com/512/1828/1828884.png';
            img.className = 'star';
            img.style.left = star.x + '%';
            img.style.top = star.y + '%';
            img.onclick = () => openTask(index);
            img.id = `star-${index}`;
            container.appendChild(img);
        });
    }

    function selectHero(url) {
        const hero = document.getElementById('hero');
        hero.src = url;
        hero.style.display = 'block';
        document.getElementById('char-selection').style.display = 'none';
        updateHeroPos(state.heroPos.x, state.heroPos.y);
    }

    function updateHeroPos(x, y) {
        const hero = document.getElementById('hero');
        hero.style.left = `calc(${x}% - 30px)`;
        hero.style.top = `calc(${y}% - 30px)`;
    }

    function openTask(index) {
        if (state.completed.includes(index)) return;
        state.currentStar = index;
        const task = data.stars[index].task;
        
        document.getElementById('question-text').innerText = task.q;
        const optionsHtml = task.o.map((opt, i) => 
            `<button class="option-btn" onclick="checkAnswer(${i})">${opt}</button>`
        ).join('');
        
        document.getElementById('options-container').innerHTML = optionsHtml;
        document.getElementById('quiz-modal').classList.add('active');
    }

    function checkAnswer(idx) {
        const modal = document.getElementById('quiz-modal');
        const starData = data.stars[state.currentStar];
        
        if (idx === starData.task.a) {
            // Верно
            state.completed.push(state.currentStar);
            document.getElementById(`star-${state.currentStar}`).classList.add('completed');
            updateHeroPos(starData.x, starData.y);
            state.heroPos = { x: starData.x, y: starData.y };
        } else {
            // Ошибка - возврат в начало
            updateHeroPos(data.startX || 50, data.startY || 90);
            state.heroPos = { x: data.startX || 50, y: data.startY || 90 };
        }
        
        modal.classList.remove('active');
    }

    init();
</script>
</body>
</html>
