<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
    #game-container { position: relative; width: 100%; height: 100%; background-size: cover; background-position: center; }
    
    /* Оверлеи и модалки */
    .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; color: white; }
    .char-select { display: flex; gap: 20px; margin-top: 20px; }
    .char-option { width: 100px; height: 100px; object-fit: contain; cursor: pointer; transition: 0.2s; background: rgba(255,255,255,0.1); border-radius: 10px; padding: 10px; }
    .char-option:hover { transform: scale(1.1); background: rgba(255,255,255,0.3); }
    
    /* Игровые элементы */
    .player { position: absolute; width: 50px; height: 50px; transform: translate(-50%, -50%); transition: all 1s cubic-bezier(0.4, 0, 0.2, 1); z-index: 50; object-fit: contain; pointer-events: none; }
    .star { position: absolute; width: 30px; height: 30px; background: gold; clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); transform: translate(-50%, -50%); cursor: pointer; z-index: 40; transition: 0.3s; }
    .star:hover { transform: translate(-50%, -50%) scale(1.2); }
    .star.completed { opacity: 0.3; pointer-events: none; }

    /* Окно вопроса */
    #question-modal { display: none; text-align: center; padding: 30px; background: #1a1f33; border: 2px solid #00bfff; border-radius: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
    .answers { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
    .answer-btn { padding: 10px; background: #00bfff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
    .answer-btn:hover { background: #008cba; }
  </style>
</head>
<body>

  <div id="game-container">
    <!-- Звезды и игрок будут добавляться сюда через JS -->
  </div>

  <!-- Экран выбора персонажа -->
  <div id="start-screen" class="overlay">
    <h2>Выберите персонажа</h2>
    <div class="char-select" id="char-select-container"></div>
  </div>

  <!-- Модальное окно с вопросом -->
  <div id="question-overlay" class="overlay" style="display: none; background: rgba(0,0,0,0.6);">
    <div id="question-modal">
      <h3 id="q-text">Вопрос?</h3>
      <div class="answers" id="q-answers"></div>
    </div>
  </div>

  <script>
    // 1. Извлекаем данные из URL
    const urlParams = new URLSearchParams(window.location.search);
    const rawData = urlParams.get('data');
    
    if (!rawData) {
      document.body.innerHTML = "<h2 style='color:white;text-align:center;'>Нет данных для загрузки игры</h2>";
    } else {
      const gameData = JSON.parse(decodeURIComponent(atob(rawData)));
      initGame(gameData);
    }

    function initGame(data) {
      const container = document.getElementById('game-container');
      const startScreen = document.getElementById('start-screen');
      const charContainer = document.getElementById('char-select-container');
      
      let playerElement = null;
      let currentTask = null; // текущая активная звезда

      // Устанавливаем фон
      container.style.backgroundImage = `url(${data.bg})`;

      // 2. Генерируем выбор персонажей
      data.chars.forEach(imgUrl => {
        const img = document.createElement('img');
        img.src = imgUrl;
        img.className = 'char-option';
        img.onclick = () => startGame(imgUrl);
        charContainer.appendChild(img);
      });

      // 3. Запуск игры после выбора
      function startGame(charImgUrl) {
        startScreen.style.display = 'none';

        // Создаем игрока на стартовой позиции
        playerElement = document.createElement('img');
        playerElement.src = charImgUrl;
        playerElement.className = 'player';
        setPlayerPos(data.startPos.x, data.startPos.y);
        container.appendChild(playerElement);

        // Расставляем звезды
        data.tasks.forEach((task, index) => {
          const star = document.createElement('div');
          star.className = 'star';
          star.style.left = `${task.x}%`;
          star.style.top = `${task.y}%`;
          star.onclick = () => openQuestion(task, star);
          container.appendChild(star);
        });
      }

      function setPlayerPos(x, y) {
        playerElement.style.left = `${x}%`;
        playerElement.style.top = `${y}%`;
      }

      // 4. Логика вопросов
      function openQuestion(task, starElement) {
        currentTask = { ...task, element: starElement };
        document.getElementById('q-text').innerText = task.question;
        
        const answersContainer = document.getElementById('q-answers');
        answersContainer.innerHTML = '';
        
        task.options.forEach(opt => {
          const btn = document.createElement('button');
          btn.className = 'answer-btn';
          btn.innerText = opt.trim();
          btn.onclick = () => checkAnswer(opt.trim());
          answersContainer.appendChild(btn);
        });

        document.getElementById('question-overlay').style.display = 'flex';
        document.getElementById('question-modal').style.display = 'block';
      }

      function checkAnswer(selectedOption) {
        document.getElementById('question-overlay').style.display = 'none';
        
        if (selectedOption === currentTask.correct.trim()) {
          // ПРАВИЛЬНО: двигаем к звезде, отмечаем ее пройденной
          setPlayerPos(currentTask.x, currentTask.y);
          currentTask.element.classList.add('completed');
        } else {
          // ОШИБКА: возвращаем на старт
          alert("Неверно! Возвращаемся в начало.");
          setPlayerPos(data.startPos.x, data.startPos.y);
        }
      }
    }
  </script>
</body>
</html>
